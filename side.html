<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Printing System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --scale: 1;
      /* Classic Theme Colors */
      --primary-dark: #2c3e50;
      --accent-green: #27ae60;
      --bg-light: #f4f7f6;
      --border-gray: #dcdde1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      padding: 40px 20px;
      background-color: var(--bg-light);
    }

    /* --- DASHBOARD UI AREA --- */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background-color: white;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid var(--border-gray);
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--bg-light);
      padding-bottom: 20px;
    }

    header h1 {
      font-size: 1.8rem;
      color: var(--primary-dark);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand-sub {
      color: var(--accent-green);
      font-weight: 700;
      font-size: 1.2rem;
    }

    .input-section {
      background: #fff;
      margin-bottom: 25px;
    }

    .section-label {
      font-weight: 600;
      color: #555;
      margin-bottom: 15px;
      display: block;
    }

    .input-options {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    /* Button Styling */
    button {
      padding: 10px 22px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    #pasteBtn { background-color: #ebedef; color: #2c3e50; border: 1px solid #d5d8dc; }
    #pasteBtn:hover { background-color: #d5d8dc; }

    #addBtn { background-color: var(--primary-dark); color: white; }
    #addBtn:hover { background-color: #1a252f; transform: translateY(-1px); }

    #mergeBtn { background-color: #f39c12; color: white; }
    #mergeBtn:hover { background-color: #d68910; transform: translateY(-1px); }

    #downloadBtn { background-color: var(--accent-green); color: white; margin-left: auto; }
    #downloadBtn:hover { background-color: #219150; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }

    textarea {
      width: 100%;
      height: 140px;
      padding: 15px;
      border: 2px solid #f0f3f4;
      border-radius: 8px;
      resize: vertical;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus { border-color: var(--accent-green); }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 15px;
      padding: 20px 0;
      border-top: 1px solid #f0f3f4;
      align-items: center;
    }

    .layout-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #666;
    }

    select {
      padding: 8px 12px;
      border: 1px solid var(--border-gray);
      border-radius: 6px;
      background: white;
      outline: none;
    }

    /* --- PREVIEW AREA UI --- */
    .preview-section {
      margin-top: 40px;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 5px;
    }

    .page-count {
      background: var(--primary-dark);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .no-preview {
      text-align: center;
      padding: 50px;
      color: #999;
      border: 2px dashed #eee;
      border-radius: 12px;
    }

    /* --- REMAINING CSS: UNTOUCHED ORIGINAL CARD LOGIC --- */
    .page {
      width: 210mm;
      height: 297mm;
      margin: 0 auto 20px;
      padding: 5mm;
      background-color: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      page-break-after: always;
      position: relative;
      overflow: hidden;
    }

    .page.landscape {
      width: 297mm;
      height: 210mm;
    }

    .card-grid {
      display: grid;
      width: 100%;
      height: 100%;
      gap: 2mm;
    }

    .card {
      border: 1px solid #ddd;
      padding: calc(2mm * var(--scale));
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      font-size: calc(9px * var(--scale));
      background: white;
      overflow: hidden;
    }

    .card-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: space-between;
    }

    .card-logo { 
      width: calc(30px * var(--scale)); 
      height: calc(30px * var(--scale)); 
      object-fit: contain;
      flex-shrink: 0;
    }
    
    .card-amount { 
      font-weight: bold; 
      font-size: calc(12px * var(--scale)); 
      margin-bottom: calc(0.5mm * var(--scale)); 
    }
    
    .card-ref { 
      font-size: calc(10px * var(--scale)); 
      margin-bottom: calc(0.5mm * var(--scale)); 
    }
    
    .jbonly { font-weight: bold; }
    
    .card-serial { 
      font-family: 'Times New Roman'; 
      font-size: calc(11px * var(--scale)); 
      margin: 0;
    }
    
    .card-pin { 
      font-family: 'Times New Roman'; 
      font-size: calc(14px * var(--scale)); 
      margin: 0;
    }
    
    .pinonly { font-weight: bold; }
    
    .card-date { 
      font-size: calc(9px * var(--scale)); 
      color: #666; 
      margin: 0;
    }

    .topit {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: nowrap;
    }

    .topit-content {
      flex: 1;
      margin-right: calc(2mm * var(--scale));
    }

    @media print {
      @page { size: A4; margin: 0; }
      body { background-color: white; padding: 0; margin: 0; }
      .container { box-shadow: none; border: none; width: 100%; padding: 0; }
      header, .input-section, .controls, .preview-header { display: none; }
      .page { box-shadow: none; margin: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Card Printing System</h1>
      <div class="brand-sub">J&B Concepts</div>
    </header>

    <div class="input-section">
      <span class="section-label">1. Load Your Data</span>
      <div class="input-options">
        <button id="pasteBtn">📋 Paste Text</button>
        <input type="file" id="fileInput" style="display: none;" accept=".txt">
        <button onclick="document.getElementById('fileInput').click()" style="background: #ebedef; color: #2c3e50; border: 1px solid #d5d8dc;">📁 Choose File</button>
      </div>
      <textarea id="textInput" placeholder="Paste your card data here..."></textarea>
    </div>

    <div class="controls">
      <button id="addBtn">Generate Batch</button>
      <button id="mergeBtn">Merge Data</button>
      
      <div class="layout-selector">
        <label for="layoutSelect">Layout:</label>
        <select id="layoutSelect">
          <option value="4x10">4x10 (Landscape)</option>
          <option value="5x10">5x10 (Landscape)</option>
          <option value="6x10">6x10 (Landscape)</option>
          <option value="10x4">10x4 (Portrait)</option>
          <option value="15x4">15x4 (Portrait)</option>
          <option value="12x4">12x4 (Portrait)</option>
          <option value="10x3">10x3 (Portrait)</option>
          <option value="10x2">10x2 (Portrait)</option>
        </select>
      </div>

      <button id="downloadBtn">Download PDF</button>
    </div>

    <div class="preview-section">
      <div class="preview-header">
        <h2 style="font-size: 1.1rem; color: #444;">Live Preview</h2>
        <span class="page-count" id="pageCount"></span>
      </div>
      <div id="previewContainer">
        <div class="no-preview">No cards added yet. Generate cards to see preview.</div>
      </div>
    </div>
  </div>

  <script>
    /* --- ALL JAVASCRIPT LOGIC REMAINING 100% ORIGINAL --- */
    let allCards = [];
    const networkLogos = {
      'MTN': 'mtn.png','AIRTEL': 'airtel.png','GLO': 'glo.png','9MOBILE': '9mobile.png',
      'Mtn': 'mtn.png','Airtel': 'airtel.png','Glo': 'glo.png','9mobile': '9mobile.png'
    };

    const textInput = document.getElementById('textInput');
    const fileInput = document.getElementById('fileInput');
    const pasteBtn = document.getElementById('pasteBtn');
    const addBtn = document.getElementById('addBtn');
    const mergeBtn = document.getElementById('mergeBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const layoutSelect = document.getElementById('layoutSelect');
    const previewContainer = document.getElementById('previewContainer');
    const pageCountElement = document.getElementById('pageCount');

    pasteBtn.addEventListener('click', () => {
      navigator.clipboard.readText().then(text => textInput.value = text);
    });
    
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0]; 
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => textInput.value = e.target.result;
      reader.readAsText(file);
    });

    function parseCardData(text) {
      const lines = text.split('\n'), cards = [];
      for (const line of lines) {
        if (!line.trim() || line.includes('Serial') || line.includes('Pin')) continue;
        const parts = line.trim().split(/\s+/);
        if (parts.length >= 5 && /^\d{14,}/.test(parts[0]) && /^\d{5,}/.test(parts[1])) {
          cards.push({
            serial: parts[0],
            pin: parts[1],
            network: parts[2],
            amount: parts[3],
            date: parts.slice(4).join(' ')
          });
        } else if (parts.length >= 6 && /^\d+$/.test(parts[0]) && parts[2].startsWith('@')) {
          cards.push({
            index: parts[0],
            date: parts[1] + " " + parts[2],
            network: parts[3],
            amount: parts[4],
            serial: parts[5],
            pin: parts[6]
          });
        }
      }
      return cards;
    }

    addBtn.addEventListener('click', () => {
      const newCards = parseCardData(textInput.value.trim());
      allCards = newCards;
      renderPreview();
    });

    mergeBtn.addEventListener('click', () => {
      const newCards = parseCardData(textInput.value.trim());
      allCards = [...allCards, ...newCards];
      renderPreview();
    });

    layoutSelect.addEventListener('change', renderPreview);

    function renderPreview() {
      if (allCards.length === 0) {
        previewContainer.innerHTML = '<div class="no-preview">No cards added yet.</div>';
        pageCountElement.textContent = ''; 
        return;
      }
      
      const layout = layoutSelect.value;
      const isLandscape = ['4x10', '5x10', '6x10'].includes(layout);
      
      let rows, cols;
      if (isLandscape) {
        [cols, rows] = layout.split('x').map(Number);
      } else {
        [rows, cols] = layout.split('x').map(Number);
      }

      const cardsPerPage = rows * cols;
      const pageCount = Math.ceil(allCards.length / cardsPerPage);
      pageCountElement.textContent = `${pageCount} Page(s)`;
      
      let scale;
      if (isLandscape) {
        const page_inner_w_mm = 297 - 10;
        const page_inner_h_mm = 210 - 10;
        const gap_mm = 2;
        const col_w_mm = (page_inner_w_mm - ((cols - 1) * gap_mm)) / cols;
        const row_h_mm = (page_inner_h_mm - ((rows - 1) * gap_mm)) / rows;
        scale = Math.min(col_w_mm / 20, row_h_mm / 28);
      } else {
        const page_inner_h_mm = 297 - 10;
        const row_h_mm = (page_inner_h_mm - ((rows - 1) * 2)) / rows;
        scale = row_h_mm / 24.5;
      }
      
      scale = Math.min(1.2, Math.max(0.8, scale));
      document.documentElement.style.setProperty('--scale', scale);

      previewContainer.innerHTML = '';
      for (let i = 0; i < allCards.length; i += cardsPerPage) {
        createPage(allCards.slice(i, i + cardsPerPage), rows, cols, i, isLandscape, layout);
      }
    }

    function createPage(cards, rows, cols, startIndex, isLandscape, layout) {
      const page = document.createElement('div');
      page.className = isLandscape ? 'page landscape' : 'page';
      const grid = document.createElement('div');
      grid.className = 'card-grid';
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      cards.forEach((c, idx) => grid.appendChild(createCardElement(c, startIndex + idx + 1, layout)));
      page.appendChild(grid); 
      previewContainer.appendChild(page);
    }

    function formatPinSmart(pin) {
      const groups = [];
      let i = 0;
      while (pin.length - i > 4) {
        groups.push(pin.slice(i, i + 4));
        i += 4;
      }
      groups.push(pin.slice(i));
      if (groups.length > 1 && groups[groups.length - 1].length < 4) {
        groups[groups.length - 2] += groups.pop();
      }
      return groups.join("-");
    }

    function createCardElement(card, cellNumber, layout) {
      const div = document.createElement('div');
      div.className = `card card-${layout}`;
      const formattedPin = formatPinSmart(card.pin);
      div.innerHTML = `
        <div class="card-content">
          <div class="topit">
            <div class="topit-content">
              <div class="card-amount">${card.network} ${card.amount}</div>
              <div class="card-ref">Ref: <span class="jbonly">J&B Concepts_${cellNumber}</span></div>
              <div class="card-serial">S/N: ${card.serial}</div>
            </div>
            <img class="card-logo" src="${networkLogos[card.network] || 'default.png'}" alt="${card.network}">
          </div>
          <div class="card-pin">PIN: <span class="pinonly">${formattedPin}</span></div>
          <div class="card-date">${card.date}</div>
        </div>`;
      return div;
    }

    downloadBtn.addEventListener('click', () => {
      if (!allCards.length) return alert('No cards to download.');
      const { jsPDF } = window.jspdf; 
      const pages = document.querySelectorAll('.page');
      let doc = null;
      const capturePage = idx => {
        if (idx >= pages.length) return doc.save('J&B_Cards.pdf');
        const page = pages[idx];
        const isLandscape = page.classList.contains('landscape');
        if (idx === 0) {
          doc = new jsPDF({ orientation: isLandscape ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });
        }
        html2canvas(page, { scale: 2, useCORS: true }).then(canvas => {
          if (idx > 0) doc.addPage([210, 297], isLandscape ? 'landscape' : 'portrait');
          const imgWidth = isLandscape ? 297 : 210;
          const imgHeight = isLandscape ? 210 : 297;
          doc.addImage(canvas.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, imgWidth, imgHeight);
          capturePage(idx + 1);
        });
      };
      capturePage(0);
    });
  </script>
</body>
</html>
